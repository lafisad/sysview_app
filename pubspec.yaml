name: sysview_app
description: A Flutter app that displays comprehensive system information like fastfetch.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^10.1.0
  battery_plus: ^6.0.2
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.0.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true